engagement_rate:
  formula: "(likes + comments) / views"
  thresholds:
    low: 0.02
    medium: 0.05
    high: 0.10

estimated_reach:
  formula: "views * 1.3"

click_quality_score:
  formula: "retention_rate * engagement_rate"

discussion_rate:
  formula: "comments / views"

estimated_ctr:
  formula: "likes / views * 0.15"
  note: "approximation only"

attention_compression:
  formula: "key_points_count / duration_minutes"
